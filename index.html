<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha Socuty</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: #000;
        }

        /* Верхня панель імітації браузера */
        .header {
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #8e8e8e;
        }

        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 100px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .menu-mockup {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            font-size: 18px;
            border-bottom: 1px solid #f0f0f0;
        }

        .icon {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }

        /* Стрілка */
        .arrow {
            position: absolute;
            right: 0;
            top: 60px;
            width: 120px;
            transform: rotate(-10deg);
        }

        .dots {
            font-size: 24px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>&lsaquo;</span>
        <span>&times;</span>
        <span>aishasocuty.com</span>
        <span class="dots">•••</span>
    </div>

    <div class="content">
        <h1>1. CLICK ON <span class="dots">•••</span></h1>
        
        <div class="menu-mockup">
            <div class="menu-item" style="color: #8e8e8e;">
                <span class="icon">🏳</span> Report
            </div>
            <div class="menu-item" style="font-weight: 600;">
                <span class="icon">🧭</span> 2. Open in browser
            </div>
            <div class="menu-item" style="color: #8e8e8e;">
                <span class="icon">🔗</span> Copy link
            </div>
        </div>

        <svg class="arrow" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 80C40 70 70 40 85 15" stroke="black" stroke-width="3" stroke-linecap="round"/>
            <path d="M70 20L85 15L88 32" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

</body>
</html>
