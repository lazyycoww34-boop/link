<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redirecting...</title>
    
    <script>
        const destinationUrl = "https://ВАШЕ_ПОСИЛАННЯ_ТУТ.com"; // ЗАМІНІТЬ ЦЕ

        function detectEnvironment() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isTikTok = ua.toLowerCase().indexOf('tiktok') > -1 || ua.toLowerCase().indexOf('musical_ly') > -1;
            const isInstagram = ua.indexOf('Instagram') > -1 || ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;

            // Якщо ми НЕ в додатку (тобто вже у браузері) - редиректимо
            if (!isTikTok && !isInstagram) {
                window.location.replace(destinationUrl);
            }
        }

        // Запускаємо перевірку
        window.onload = detectEnvironment;
    </script>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            background-color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; color: #000; overflow: hidden;
        }

        .header {
            width: 100%; padding: 15px 0;
            display: flex; justify-content: space-around; align-items: center;
            border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #8e8e8e;
        }

        .content {
            flex-grow: 1; display: flex; flex-direction: column;
            padding-top: 60px; width: 90%; max-width: 400px; position: relative;
        }

        h1 { font-size: 24px; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; }

        .menu-item {
            display: flex; align-items: center; padding: 18px 0;
            font-size: 17px; border-bottom: 1px solid #f2f2f2;
        }

        .icon { margin-right: 15px; width: 24px; text-align: center; }

        .arrow-svg {
            position: absolute; right: 5px; top: 20px;
            width: 100px; transform: rotate(-5deg);
        }

        /* Додаткова кнопка для TikTok, якщо редирект не спрацював */
        .fallback-btn {
            margin-top: 40px;
            padding: 15px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-size: 20px;">&lsaquo;</span>
        <span id="domain-text">Loading...</span>
        <span style="font-size: 20px;">•••</span>
    </div>

    <div class="content">
        <svg class="arrow-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 85C45 75 75 45 88 18" stroke="black" stroke-width="4" stroke-linecap="round"/>
            <path d="M72 22L88 18L92 34" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <h1>1. Клікни на •••</h1>
        
        <div class="menu-item" style="color: #ccc;">
            <span class="icon">🏳</span> Скарга
        </div>
        <div class="menu-item" style="font-weight: 700;">
            <span class="icon">🧭</span> 2. Відкрити в браузері
        </div>
        
        <a href="#" onclick="window.location.reload();" class="fallback-btn">Оновити сторінку</a>
    </div>

    <script>
        document.getElementById('domain-text').innerText = window.location.hostname;
    </script>
</body>
</html>
