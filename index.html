<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aisha Socuty</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* Центруємо весь контент */
        .wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: left;
            position: relative;
        }

        .content {
            z-index: 2;
        }

        /* Стилізація тексту як на скріншоті */
        h1 {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 10px 0;
            color: #000;
            letter-spacing: -1px;
        }

        /* Імітація меню, що випадає (пункт 2) */
        .menu-mockup {
            margin-top: 30px;
            text-align: left;
            width: 250px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            font-size: 16px;
            color: #000;
            font-weight: 500;
        }

        .menu-item img {
            width: 20px;
            margin-right: 10px;
            opacity: 0.7;
        }

        /* Малюємо вигнуту стрілку */
        .arrow {
            position: absolute;
            top: 50px; /* Приблизно де знаходяться три крапки в ТТ */
            right: 40px;
            width: 120px;
            transform: rotate(-10deg);
            z-index: 1;
        }

        /* Ховаємо контент для звичайних браузерів */
        #normal-browser {
            display: none;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 18px 40px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="wrapper" id="tiktok-notice" style="display: none;">
    <svg class="arrow" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 90C40 80 70 50 85 10" stroke="black" stroke-width="3" stroke-linecap="round"/>
        <path d="M75 15L85 10L88 22" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="content">
        <h1>1. Натисни на •••</h1>
        
        <div class="menu-mockup">
            <div class="menu-item" style="opacity: 0.4;">🚩 Поскаржитися</div>
            <h1>2. <span style="font-size: 32px;">🧭</span> Open in browser</h1>
            <div class="menu-item" style="opacity: 0.4;">🔗 Копіювати посилання</div>
        </div>
    </div>
</div>

<div class="wrapper" id="normal-browser">
    <h1>Welcome!</h1>
    <p>Ви перейшли у зовнішній браузер.</p>
    <a href="https://t.me/+XBZ9wifxqug2YTVi" class="btn">GO TO SHOP</a>
</div>

<script>
    function checkBrowser() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isTikTok = ua.indexOf("TikTok") > -1;

        if (isTikTok) {
            document.getElementById('tiktok-notice').style.display = 'flex';
        } else {
            // Якщо це не TikTok, показуємо кнопку або робимо редірект
            document.getElementById('normal-browser').style.display = 'flex';
            // Можна розкоментувати рядок нижче для авто-переходу:
            // window.location.href = "https://t.me/+XBZ9wifxqug2YTVi";
        }
    }
    checkBrowser();
</script>

</body>
</html>
