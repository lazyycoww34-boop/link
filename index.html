<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Перехід до сайту...</title>
    
    <script>
        // === НАЛАШТУВАННЯ ===
        // Вставте сюди ваше кінцеве посилання (куди має потрапити користувач)
        const destinationUrl = "https://t.me/+XBZ9wifxqug2YTVi";

        function checkAndRedirect() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // Перевіряємо, чи це вбудований браузер соцмереж
            const isInsideApp = (
                ua.indexOf('Instagram') > -1 || 
                ua.indexOf('FBAN') > -1 || 
                ua.indexOf('FBAV') > -1 || 
                ua.indexOf('TikTok') > -1 ||
                ua.indexOf('Messenger') > -1
            );

            // Якщо користувач вже у звичайному браузері (не в додатку) — миттєво редиректимо
            if (!isInsideApp) {
                window.location.replace(destinationUrl);
            }
        }

        // Запускаємо перевірку відразу при завантаженні
        checkAndRedirect();
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: #000;
            overflow: hidden;
        }

        /* Верхня панель браузера */
        .header {
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #8e8e8e;
        }

        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 80px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        h1 {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .menu-mockup {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 18px 0;
            font-size: 18px;
            border-bottom: 1px solid #f2f2f2;
        }

        .icon {
            margin-right: 15px;
            width: 24px;
            text-align: center;
            font-size: 20px;
        }

        /* Стрілка вгору */
        .arrow-svg {
            position: absolute;
            right: -10px;
            top: 40px;
            width: 110px;
            transform: rotate(-5deg);
        }

        .dots {
            font-size: 22px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .highlight {
            color: #000;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-size: 20px;">&lsaquo;</span>
        <span style="font-size: 20px;">&times;</span>
        <span id="display-url">site-entry.com</span>
        <span class="dots">•••</span>
    </div>

    <div class="content">
        <svg class="arrow-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 85C45 75 75 45 88 18" stroke="black" stroke-width="4" stroke-linecap="round"/>
            <path d="M72 22L88 18L92 34" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <h1>1. CLICK ON <span class="dots">•••</span></h1>
        
        <div class="menu-mockup">
            <div class="menu-item" style="color: #bcbcbc;">
                <span class="icon">🏳</span> Report
            </div>
            <div class="menu-item" style="font-weight: 700;">
                <span class="icon">🧭</span> 2. Open in browser
            </div>
            <div class="menu-item" style="color: #bcbcbc;">
                <span class="icon">🔗</span> Copy link
            </div>
        </div>
    </div>

    <script>
        // Автоматично підставляємо назву вашого домену в шапку для реалістичності
        document.getElementById('display-url').innerText = window.location.hostname;
    </script>

</body>
</html>
